<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud con Amor - Catálogo de Productos</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/macrobiotica.css}">

    <style>
        body {
            background-color: #ffffff;
            color: #1a4d2e;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .minimal-hub {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .minimal-header {
            margin-bottom: 4rem;
        }

        .minimal-header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -0.05em;
            color: #1a4d2e;
            margin-bottom: 0.5rem;
        }

        .minimal-header p {
            color: #4f6f52;
            font-weight: 500;
            opacity: 0.6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            text-align: left;
        }

        .minimal-card {
            background: #f8faf9;
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            position: relative;
            text-decoration: none !important;
        }

        .minimal-card:hover {
            background: #ffffff;
            border-color: #1a4d2e;
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(26, 77, 46, 0.08);
        }

        .card-img-wrapper {
            width: 100%;
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .minimal-card:hover .card-img-wrapper img {
            transform: scale(1.05);
        }

        .stock-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.95);
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1a4d2e;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stock-badge.agotado {
            color: #ef4444;
        }

        .product-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #1a4d2e;
        }

        .product-info p {
            color: #4f6f52;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.8;
        }

        .card-footer-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a4d2e;
            font-family: 'Outfit', sans-serif;
        }

        .btn-cart {
            background: rgba(26, 77, 46, 0.1);
            color: #1a4d2e;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .minimal-card:hover .btn-cart {
            background: #1a4d2e;
            color: #ffffff;
        }

        .header-actions {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .btn-back {
            color: #4f6f52;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            color: #1a4d2e;
            transform: translateX(-5px);
        }

        @keyframes revealHub {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: revealHub 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            animation-fill-mode: both;
        }
        
    </style>
</head>

<body>

    <div class="header-actions">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Hub</a>
    </div>

    <main class="minimal-hub">
        <!-- HEADER -->
        <header class="minimal-header reveal" style="animation-delay: 0.1s;">
            <img th:src="@{/images/image.png}" alt="Logo" style="width: 70px; margin-bottom: 2rem;">
            <h1>Nuestro Catálogo</h1>
            <p>Bienestar Natural y Productos Seleccionados</p>
        </header>

        <!-- PRODUCT GRID -->
        <div class="product-grid">
            <!-- Thymeleaf loop for products -->
            <div th:each="producto, iterStat : ${productos}" class="minimal-card reveal" th:style="'animation-delay: ' + (${iterStat.index} * 0.1 + 0.2) + 's'">
                
                <div class="stock-badge" th:if="${producto.stock > 0}" th:text="${producto.stock} + ' disponibles'"></div>
                <div class="stock-badge agotado" th:if="${producto.stock == 0}">Agotado</div>

                <div class="card-img-wrapper">
                    <img th:src="@{/images/natural-supplements.jpg}"
                        src="https://images.unsplash.com/photo-1512152272829-e3139592d56f?q=80" alt="Producto">
                </div>

                <div class="product-info">
                    <h3 th:text="${producto.nombre}">Nombre del Producto</h3>
                    <p th:text="${producto.descripcion}">Descripción del producto...</p>

                    <div class="card-footer-custom">
                        <span class="price-tag" th:text="'₡' + ${producto.precio}">₡0</span>
                        <a href="#" class="btn-cart">
                            <i class="fas fa-cart-plus"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- FALLBACK IF EMPTY -->
            <div th:if="${#lists.isEmpty(productos)}" class="col-12 text-center py-5 reveal" style="grid-column: 1 / -1; animation-delay: 0.2s;">
                <i class="fas fa-seedling fa-4x text-muted mb-4" style="color: #1a4d2e !important; opacity: 0.3;"></i>
                <h2 style="font-family: 'Outfit', sans-serif; font-weight: 700; color: #1a4d2e;">Nuestro jardín está creciendo</h2>
                <p style="color: #4f6f52;">Vuelve pronto para descubrir nuevos productos.</p>
            </div>
        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
