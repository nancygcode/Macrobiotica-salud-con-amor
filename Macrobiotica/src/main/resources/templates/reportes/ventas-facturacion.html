<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Maestro | Macrobiótica</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/macrobiotica.css}">

    <style>
        body {
            background-color: #ffffff;
            color: #1a4d2e;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 2.5rem 0;
        }

        /* Variables de color específicas para Reporte */
        :root {
            --expense-color: #d97706; /* Color ámbar/miel cálido para gastos */
            --primary-green: #1a4d2e;
            --neutral-bg: #f8faf9;
        }

        .report-content {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .minimal-header-report {
            text-align: center;
            margin-bottom: 5rem;
        }

        .minimal-header-report h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -0.05em;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .minimal-header-report p {
            color: #4f6f52;
            font-weight: 500;
            opacity: 0.6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        /* KPI Section */
        .minimal-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .kpi-minimal-card {
            background: var(--neutral-bg);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .kpi-minimal-card:hover {
            background: #ffffff;
            border-color: var(--primary-green);
            box-shadow: 0 20px 40px rgba(26, 77, 46, 0.04);
        }

        .kpi-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4f6f52;
            opacity: 0.7;
            margin-bottom: 1rem;
        }

        .kpi-value {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .kpi-sub {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-green);
        }

        /* Minimal Table */
        .minimal-table-container {
            background: #ffffff;
            border: 1px solid #f1f5f2;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .minimal-table {
            width: 100%;
            border-collapse: collapse;
        }

        .minimal-table th {
            background: var(--neutral-bg);
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #4f6f52;
            letter-spacing: 0.1em;
        }

        .minimal-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f2;
            font-size: 0.95rem;
        }

        .minimal-table tr:last-child td {
            border-bottom: none;
        }

        .btn-minimal-back {
            background: transparent;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-minimal-back:hover {
            background: var(--primary-green);
            color: #ffffff;
        }

        .bar-wrap {
            width: 100px;
            height: 6px;
            background: #eef2ef;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar-val {
            height: 100%;
            background: var(--primary-green);
            border-radius: 10px;
        }

        /* Chart container */
        .chart-panel {
            background: var(--neutral-bg);
            border-radius: 30px;
            padding: 3rem;
            margin-bottom: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }

        @media (max-width: 992px) {
            .row-data {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <main class="report-content">
        <!-- HEADER -->
        <header class="minimal-header-report">
            <img th:src="@{/images/image.png}" alt="Logo" style="width: 65px; margin-bottom: 1.5rem;">
            <h1>Reporte Maestro</h1>
            <p>Estado Financiero Consolidado</p>
        </header>

        <!-- KPI GRID -->
        <div class="minimal-kpi-grid">
            <!-- INGRESOS -->
            <div class="kpi-minimal-card">
                <span class="kpi-label">Ingresos Totales</span>
                <div class="kpi-value" th:text="'₡' + ${#numbers.formatDecimal(totalVentas, 1, 'COMMA', 0, 'POINT')}">₡0</div>
                <div class="kpi-sub">
                    <i class="fas fa-check-circle me-1 opacity-40"></i>
                    <span th:text="${cantFacturasVentas} + ' Facturas Emitidas'">0 Facturas</span>
                </div>
            </div>

            <!-- GASTOS (Nuevo Color) -->
            <div class="kpi-minimal-card" style="border-left: 5px solid var(--expense-color);">
                <span class="kpi-label" style="color: var(--expense-color);">Gastos Operativos</span>
                <div class="kpi-value" style="color: var(--expense-color);" th:text="'₡' + ${#numbers.formatDecimal(totalGastoProvedores, 1, 'COMMA', 0, 'POINT')}">₡0</div>
                <div class="kpi-sub" style="color: var(--expense-color);">
                    <i class="fas fa-file-invoice me-1 opacity-40"></i>
                    <span th:text="${cantFacturasProvedores} + ' Obligaciones'">0 Facturas</span>
                </div>
            </div>

            <!-- BALANCE -->
            <div class="kpi-minimal-card" th:style="${balanceNeto.doubleValue() >= 0 ? 'background: #f0f7f2;' : 'background: #fff5f5;'}">
                <span class="kpi-label">Balance Neto</span>
                <div class="kpi-value" 
                     th:classappend="${balanceNeto.doubleValue() >= 0 ? 'text-primary-green' : 'text-danger'}"
                     th:text="'₡' + ${#numbers.formatDecimal(balanceNeto, 1, 'COMMA', 0, 'POINT')}">₡0</div>
                <div class="kpi-sub">
                    <i class="fas me-1" th:classappend="${balanceNeto.doubleValue() >= 0 ? 'fa-chart-line text-success' : 'fa-triangle-exclamation text-danger'}"></i>
                    <span th:text="${balanceNeto.doubleValue() >= 0 ? 'Flujo Positivo' : 'Déficit Detectado'}">Estado</span>
                </div>
            </div>
        </div>

        <!-- CHART AREA (Expanded and Minimalist) -->
        <div class="chart-panel shadow-sm border-0">
            <div class="panel-title">
                <i class="fas fa-chart-pie"></i> Proporción de Flujo de Caja
            </div>
            <div style="width: 100%; max-width: 350px; height: 350px;">
                <canvas id="minimalBalanceChart"></canvas>
            </div>
        </div>

        <!-- LISTS SECTION -->
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="panel-title px-4 mb-3">
                    <i class="fas fa-user-tag"></i> Desempeño Comercial
                </div>
                <div class="minimal-table-container mx-2 shadow-sm border-0">
                    <table class="minimal-table">
                        <thead>
                            <tr>
                                <th>Vendedor</th>
                                <th>Docs</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="v : ${ventasPorVendedor}">
                                <td class="fw-700" th:text="${v[0]}">#ID</td>
                                <td th:text="${v[1]}">0</td>
                                <td>
                                    <div class="fw-700 text-primary-green" th:text="'₡' + ${#numbers.formatDecimal(v[2], 1, 'COMMA', 0, 'POINT')}">₡0</div>
                                    <div class="bar-wrap">
                                        <div class="bar-val" th:style="'width: ' + (${totalVentas.doubleValue() > 0 ? (v[2] * 100 / totalVentas) : 0}) + '%'"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="panel-title px-4 mb-3">
                    <i class="fas fa-store"></i> Distribución de Gastos
                </div>
                <div class="minimal-table-container mx-2 shadow-sm border-0">
                    <table class="minimal-table">
                        <thead>
                            <tr>
                                <th>Proveedor</th>
                                <th>Fact.</th>
                                <th>Total Pagado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="g : ${gastoPorProvedor}">
                                <td class="fw-700" th:text="${g[0]}">Nombre</td>
                                <td th:text="${g[1]}">0</td>
                                <td>
                                    <div class="fw-700" style="color: var(--expense-color);" th:text="'₡' + ${#numbers.formatDecimal(g[2], 1, 'COMMA', 0, 'POINT')}">₡0</div>
                                    <div class="bar-wrap">
                                        <div class="bar-val" th:style="'background: var(--expense-color); width: ' + (${totalGastoProvedores.doubleValue() > 0 ? (g[2] * 100 / totalGastoProvedores) : 100}) + '%'"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ACTION -->
        <div class="mt-5 text-center">
            <a href="/" class="btn-minimal-back">
                <i class="fas fa-arrow-left"></i> Regresar al Inicio
            </a>
        </div>
    </main>

    <!-- CHART INITIALIZATION -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const ctx = document.getElementById('minimalBalanceChart').getContext('2d');
        const v = /*[[${totalVentas}]]*/ 0;
        const g = /*[[${totalGastoProvedores}]]*/ 0;

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ingresos (Ventas)', 'Gastos (Proveedor)'],
                datasets: [{
                    data: [v, g],
                    backgroundColor: [
                        '#1a4d2e', // Green
                        '#d97706'  // Amber/Honey for Expenses
                    ],
                    borderColor: '#ffffff',
                    borderWidth: 4,
                    hoverOffset: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '78%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#4f6f52',
                            font: { size: 11, family: 'Plus Jakarta Sans', weight: '700' },
                            padding: 25,
                            usePointStyle: true
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1a4d2e',
                        padding: 15,
                        cornerRadius: 15,
                        titleFont: { family: 'Outfit', size: 14 }
                    }
                }
            }
        });
        /*]]>*/
    </script>
</body>

</html>
