<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas Clientes - Salud con Amor</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/macrobiotica.css}">

    <style>
        body {
            background-color: #ffffff;
            color: #1a4d2e;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .minimal-hub {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header-actions {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .btn-back {
            color: #4f6f52;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            color: #1a4d2e;
            transform: translateX(-5px);
        }

        .minimal-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .minimal-header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -0.05em;
            color: #1a4d2e;
            margin-bottom: 0.5rem;
        }

        .minimal-header p {
            color: #4f6f52;
            font-weight: 500;
            opacity: 0.6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-section h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: #1a4d2e;
            margin: 0;
        }

        .btn-premium {
            background-color: #1a4d2e;
            color: #ffffff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background-color: #f5bd02;
            color: #1a4d2e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 77, 46, 0.15);
        }

        .glass-card {
            background: #f8faf9;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid transparent;
            box-shadow: 0 10px 30px rgba(26, 77, 46, 0.05);
            transition: all 0.3s ease;
        }

        .custom-table {
            margin: 0;
            width: 100%;
        }

        .custom-table thead th {
            background-color: transparent;
            color: #4f6f52;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 1.2rem 1rem;
            border-bottom: 2px solid rgba(26, 77, 46, 0.1);
        }

        .custom-table tbody td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            color: #1a4d2e;
            border-bottom: 1px solid rgba(26, 77, 46, 0.05);
            font-weight: 500;
        }

        .custom-table tbody tr {
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .custom-table tbody tr:hover {
            background-color: #ffffff;
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(26, 77, 46, 0.05);
            border-radius: 12px;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            background-color: rgba(245, 189, 2, 0.15);
            color: #1a4d2e;
        }

        .btn-action, .btn-danger-action {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-decoration: none;
            border: none;
        }

        .btn-action {
            background-color: rgba(26, 77, 46, 0.1);
            color: #1a4d2e;
        }

        .btn-action:hover {
            background-color: #1a4d2e;
            color: #ffffff;
        }

        .btn-danger-action {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            margin-left: 0.5rem;
        }

        .btn-danger-action:hover {
            background-color: #ef4444;
            color: #ffffff;
        }

        /* Modal Styling */
        .modal-content {
            border-radius: 24px;
            border: none;
            box-shadow: 0 40px 80px rgba(26, 77, 46, 0.15);
        }

        .modal-header {
            background: #ffffff;
            border-bottom: 1px solid rgba(26, 77, 46, 0.1);
            padding: 1.5rem 2rem;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #1a4d2e;
            font-size: 1.4rem;
        }

        .btn-close:focus {
            box-shadow: none;
        }

        .modal-body {
            padding: 2rem;
            background-color: #f8faf9;
        }

        .form-label {
            font-weight: 600;
            color: #4f6f52;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            border: 1px solid rgba(26, 77, 46, 0.2);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: #ffffff;
            color: #1a4d2e;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #1a4d2e;
            box-shadow: 0 0 0 4px rgba(26, 77, 46, 0.08);
            outline: none;
        }

        .modal-footer {
            border-top: 1px solid rgba(26, 77, 46, 0.1);
            padding: 1.5rem 2rem;
            background-color: #ffffff;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .btn-outline-secondary {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            color: #4f6f52;
            border-color: rgba(26, 77, 46, 0.2);
        }

        .btn-outline-secondary:hover {
            background-color: rgba(26, 77, 46, 0.05);
            border-color: rgba(26, 77, 46, 0.3);
            color: #1a4d2e;
        }

        /* Animations */
        @keyframes revealHub {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: revealHub 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            animation-fill-mode: both;
        }

        /* Empty State */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            color: rgba(26, 77, 46, 0.2);
            margin-bottom: 1rem;
        }

        .empty-state h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #1a4d2e;
        }

        .empty-state p {
            color: #4f6f52;
        }

    </style>
</head>

<body>

    <div class="header-actions">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Hub</a>
    </div>

    <main class="minimal-hub">

        <header class="minimal-header reveal" style="animation-delay: 0.1s;">
            <img th:src="@{/images/image.png}" alt="Logo" style="width: 70px; margin-bottom: 2rem;">
            <h1>Sistema de Facturación</h1>
            <p>Registro y Control de Ventas a Clientes</p>
        </header>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show reveal" role="alert" style="border-radius: 16px; background-color: rgba(26, 77, 46, 0.1); border: 1px solid rgba(26, 77, 46, 0.2); color: #1a4d2e; font-weight: 600;">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="header-section reveal" style="animation-delay: 0.2s;">
            <h2><i class="fas fa-file-invoice me-2" style="color: #f5bd02;"></i> Facturas Clientes</h2>

            <button class="btn btn-premium" onclick="abrirModalNuevo()">
                <i class="fas fa-plus"></i> Nueva Factura
            </button>
        </div>

        <div class="glass-card reveal" style="animation-delay: 0.3s;">
            <div class="table-responsive">
                <table class="table custom-table">
                    <thead>
                        <tr>
                            <th># Factura</th>
                            <th>Cédula Cliente</th>
                            <th>Fecha Emisión</th>
                            <th>Total</th>
                            <th>Estado ID</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f : ${facturas}">
                            <td>
                                <span class="fw-bold" th:text="${f.numeroFactura}"></span>
                            </td>
                            <td>
                                <span th:text="${f.cedulaCliente}"></span>
                            </td>
                            <td>
                                <div><i class="far fa-calendar-alt me-1" style="opacity: 0.6;"></i> <span
                                        th:text="${#calendars.format(f.fechaEmision, 'dd/MM/yyyy')}"></span></div>
                            </td>
                            <td>
                                <span class="fw-bold" style="color: #1a4d2e;"
                                    th:text="'₡' + ${f.total != null ? #numbers.formatDecimal(f.total, 1, 2) : '0.00'}"></span>
                            </td>
                            <td>
                                <span class="status-badge" th:text="${f.idEstado}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-action"
                                    th:onclick="'abrirModalEditar(' + ${f.numeroFactura} + ')'" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${facturas.empty}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-icon"><i class="fas fa-box-open"></i></div>
                                    <h4>No hay facturas registradas</h4>
                                    <p>Comienza agregando una nueva factura usando el botón superior.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div class="modal fade" id="facturaModal" tabindex="-1" aria-labelledby="facturaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/facturas-cliente/guardar}" th:object="${factura}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="facturaModalLabel"><i
                                class="fas fa-file-invoice text-warning me-2"></i> Factura de Cliente</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <!-- Campo oculto para el ID -->
                        <input type="hidden" th:field="*{numeroFactura}" id="numeroFactura">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="cedulaCliente" class="form-label"><i
                                        class="fas fa-user-tag me-1 text-muted"></i> Cédula Cliente</label>
                                <input type="number" class="form-control" th:field="*{cedulaCliente}" id="cedulaCliente"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label for="cedulaVendedor" class="form-label"><i
                                        class="fas fa-user-tie me-1 text-muted"></i> Cédula Vendedor</label>
                                <input type="number" class="form-control" th:field="*{cedulaVendedor}"
                                    id="cedulaVendedor" required>
                            </div>

                            <div class="col-md-6">
                                <label for="codigoProducto" class="form-label"><i
                                        class="fas fa-box me-1 text-muted"></i> Código Producto</label>
                                <input type="number" class="form-control" th:field="*{codigoProducto}"
                                    id="codigoProducto" required>
                            </div>

                            <div class="col-md-6">
                                <label for="cantidadProducto" class="form-label">Cantidad</label>
                                <input type="number" class="form-control" th:field="*{cantidadProducto}"
                                    id="cantidadProducto">
                            </div>

                            <div class="col-md-4">
                                <label for="subtotal" class="form-label">Subtotal (₡)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{subtotal}"
                                    id="subtotal">
                            </div>

                            <div class="col-md-4">
                                <label for="iva" class="form-label">IVA (₡)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{iva}" id="iva">
                            </div>

                            <div class="col-md-4">
                                <label for="total" class="form-label">Total (₡)</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background-color: #ffffff; border-color: rgba(26, 77, 46, 0.2); color: #1a4d2e; font-weight: 600;">₡</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{total}"
                                        id="total">
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="fechaEmision" class="form-label">Fecha de Emisión</label>
                                <input type="date" class="form-control" th:field="*{fechaEmision}" id="fechaEmision">
                            </div>

                            <div class="col-md-4">
                                <label for="pagoRecibido" class="form-label">Pago Recibido (₡)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{pagoRecibido}"
                                    id="pagoRecibido">
                            </div>

                            <div class="col-md-4">
                                <label for="idEstado" class="form-label">ID Estado</label>
                                <input type="number" class="form-control" th:field="*{idEstado}" id="idEstado" required>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-premium">
                            <i class="fas fa-save"></i> Guardar Factura
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

    <script th:inline="javascript">
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            if (typeof dateStr === 'string' && dateStr.length >= 10 && dateStr.includes('-')) {
                return dateStr.substring(0, 10);
            }

            const d = new Date(dateStr);
            d.setMinutes(d.getMinutes() + d.getTimezoneOffset());

            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();

            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;

            return [year, month, day].join('-');
        }

        let facturaModal;
        document.addEventListener("DOMContentLoaded", function () {
            const modalElement = document.getElementById('facturaModal');
            facturaModal = new bootstrap.Modal(modalElement);
        });

        function abrirModalNuevo() {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-file-invoice text-warning me-2"></i> Agregar Factura de Cliente';

            // Limpiar formulario
            document.getElementById('numeroFactura').value = '';
            document.getElementById('cedulaCliente').value = '';
            document.getElementById('cedulaVendedor').value = '';
            document.getElementById('codigoProducto').value = '';
            document.getElementById('cantidadProducto').value = '';
            document.getElementById('subtotal').value = '';
            document.getElementById('iva').value = '';
            document.getElementById('total').value = '';
            document.getElementById('fechaEmision').value = '';
            document.getElementById('pagoRecibido').value = '';
            document.getElementById('idEstado').value = '';

            facturaModal.show();
        }

        function abrirModalEditar(id) {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-edit text-warning me-2"></i> Editar Factura de Cliente';

            // Fecth data via AJAX
            fetch('/facturas-cliente/obtener/' + id)
                .then(response => {
                    if (!response.ok) { throw new Error('Network response was not ok'); }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('numeroFactura').value = data.numeroFactura;
                    document.getElementById('cedulaCliente').value = data.cedulaCliente;
                    document.getElementById('cedulaVendedor').value = data.cedulaVendedor;
                    document.getElementById('codigoProducto').value = data.codigoProducto;
                    document.getElementById('cantidadProducto').value = data.cantidadProducto || '';
                    document.getElementById('subtotal').value = data.subtotal || '';
                    document.getElementById('iva').value = data.iva || '';
                    document.getElementById('total').value = data.total || '';
                    document.getElementById('fechaEmision').value = data.fechaEmision ? formatDateForInput(data.fechaEmision) : '';
                    document.getElementById('pagoRecibido').value = data.pagoRecibido || '';
                    document.getElementById('idEstado').value = data.idEstado;

                    facturaModal.show();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert('No se pudieron cargar los datos de la factura.');
                });
        }
    </script>
</body>

</html>
