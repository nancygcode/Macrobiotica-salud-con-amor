<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud con Amor | Facturas Proveedor</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/macrobiotica.css}">

    <style>
        :root {
            --primary-bg: #ffffff;
            --card-bg: #f8faf9;
            --accent-green: #1a4d2e;
            --accent-green-hover: #133c22;
            --accent-gold: #f5bd02;
            --text-main: #1a4d2e;
            --text-muted: #4f6f52;
            --border-color: rgba(26, 77, 46, 0.1);
            --shadow-sm: 0 1px 2px 0 rgba(26, 77, 46, 0.05);
            --shadow-lg: 0 30px 60px rgba(26, 77, 46, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        .minimal-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .minimal-header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: revealHub 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .minimal-header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            color: var(--accent-green);
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .minimal-header p {
            color: var(--text-muted);
            font-weight: 500;
            opacity: 0.6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin: 0;
        }

        .btn-minimal-primary {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-minimal-primary:hover {
            background: var(--accent-green-hover);
            color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .minimal-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: revealHub 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.1s;
            opacity: 0;
        }

        .minimal-card:hover {
            background: #ffffff;
            border-color: var(--accent-green);
            box-shadow: var(--shadow-lg);
        }

        .custom-table {
            width: 100%;
            margin-bottom: 0;
            color: var(--text-main);
        }

        .custom-table thead th {
            border-bottom: 2px solid var(--border-color);
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 1rem 1.5rem;
            background: transparent;
        }

        .custom-table tbody td {
            padding: 1.2rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .custom-table tbody tr:hover td {
            background-color: #ffffff;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(26, 77, 46, 0.08);
            color: var(--accent-green);
        }

        .btn-action {
            background: var(--primary-bg);
            color: var(--accent-green);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: var(--accent-green);
            color: var(--accent-gold);
            transform: scale(1.05);
            border-color: var(--accent-green);
        }

        /* Nav Link inside header */
        .hub-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .hub-link:hover {
            color: var(--accent-green);
        }

        .hub-link i {
            margin-right: 0.5rem;
        }

        /* Modal Redesign */
        .modal-content {
            border-radius: 24px;
            border: none;
            box-shadow: var(--shadow-lg);
            background-color: var(--primary-bg);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--accent-green);
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        .btn-close {
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .btn-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 2rem;
        }

        .form-label {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 500;
            box-shadow: none;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(26, 77, 46, 0.1);
        }
        
        .input-group-text {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
            font-weight: 700;
        }
        
        .input-group .form-control {
            border-left: none;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            border-radius: 0 0 24px 24px;
        }

        .btn-minimal-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-minimal-secondary:hover {
            background: #ffffff;
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        @keyframes revealHub {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            padding: 5rem 2rem;
            text-align: center;
        }

        .empty-icon {
            font-size: 3.5rem;
            color: var(--accent-green);
            opacity: 0.2;
            margin-bottom: 1.5rem;
        }

        .empty-state h4 {
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <main class="minimal-container">
        
        <a href="/" class="hub-link"><i class="fas fa-arrow-left"></i> Volver al Hub Central</a>

        <div class="minimal-header">
            <div>
                <h1><i class="fas fa-receipt" style="color: var(--accent-gold);"></i> Facturas Proveedores</h1>
                <p>Gestión de deudas y facturación externa</p>
            </div>
            <button class="btn-minimal-primary" onclick="abrirModalNuevo()">
                <i class="fas fa-plus"></i> Registrar Factura
            </button>
        </div>

        <div class="minimal-card">
            <div class="table-responsive">
                <table class="table custom-table">
                    <thead>
                        <tr>
                            <th># Factura</th>
                            <th>Proveedor</th>
                            <th>F. Compra</th>
                            <th>F. Vencimiento</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th class="text-center">Ajustes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f : ${facturas}">
                            <td>
                                <span class="fw-bold" th:text="${f.numeroFactura}"></span>
                            </td>
                            <td>
                                <span th:text="${f.codigoProvedor}"></span>
                            </td>
                            <td>
                                <div><i class="far fa-calendar text-muted me-2"></i> <span
                                        th:text="${#calendars.format(f.fechaCompra, 'dd/MM/yyyy')}"></span></div>
                            </td>
                            <td>
                                <div><i class="far fa-calendar-check text-muted me-2"></i> <span
                                        th:text="${#calendars.format(f.fechaVencimiento, 'dd/MM/yyyy')}"></span></div>
                            </td>
                            <td>
                                <span class="fw-bold" style="color: var(--accent-green);"
                                    th:text="'₡' + ${#numbers.formatDecimal(f.pagoTotal, 1, 2)}"></span>
                            </td>
                            <td>
                                <span class="status-badge" th:text="${f.idEstado}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn-action"
                                    th:onclick="'abrirModalEditar(' + ${f.numeroFactura} + ')'" title="Editar">
                                    <i class="fas fa-pen"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${facturas.empty}">
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="empty-icon"><i class="fas fa-receipt"></i></div>
                                    <h4>Sin registros documentados</h4>
                                    <p>No existen facturas de proveedores registradas. Comienza usando el botón superior.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div class="modal fade" id="facturaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/facturas-proveedor/guardar}" th:object="${factura}" method="post">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title" id="facturaModalLabel"><i class="fas fa-receipt me-2" style="color: var(--accent-gold);"></i> Factura de Proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" th:field="*{numeroFactura}" id="numeroFactura">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="codigoProvedor" class="form-label">Proveedor</label>
                                <select class="form-select" th:field="*{codigoProvedor}" id="codigoProvedor" required>
                                    <option value="">Seleccione un proveedor...</option>
                                    <option th:each="p : ${proveedores}" th:value="${p.codigoProvedor}"
                                        th:text="${p.nombreProvedor}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="idProducto" class="form-label">Producto Asociado</label>
                                <select class="form-select" th:field="*{idProducto}" id="idProducto" required>
                                    <option value="">Seleccione un producto...</option>
                                    <option th:each="prod : ${productos}" th:value="${prod.codigoProducto}"
                                        th:text="${prod.nombre}"></option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="fechaCompra" class="form-label">Fecha de Compra</label>
                                <input type="date" class="form-control" th:field="*{fechaCompra}" id="fechaCompra" required>
                            </div>
                            <div class="col-md-4">
                                <label for="fechaVencimiento" class="form-label">Vencimiento</label>
                                <input type="date" class="form-control" th:field="*{fechaVencimiento}" id="fechaVencimiento" required>
                            </div>
                            <div class="col-md-4">
                                <label for="pagoTotal" class="form-label">Monto (₡)</label>
                                <div class="input-group">
                                    <span class="input-group-text">₡</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{pagoTotal}" id="pagoTotal" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="claveHacienda" class="form-label">Clave Hacendaria (Opcional)</label>
                                <input type="number" class="form-control" th:field="*{claveHacienda}" id="claveHacienda">
                            </div>
                            <div class="col-md-4">
                                <label for="idTipoDocumento" class="form-label">Tipo de Documento</label>
                                <select class="form-select" th:field="*{idTipoDocumento}" id="idTipoDocumento" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="td : ${tiposDocumento}" th:value="${td.idTipoDocumento}" th:text="${td.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="idEstado" class="form-label">Estado Actual</label>
                                <select class="form-select" th:field="*{idEstado}" id="idEstado" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="est : ${estados}" th:value="${est.idEstado}" th:text="${est.estado}"></option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="descripcion" class="form-label">Anotaciones Adicionales</label>
                                <textarea class="form-control" th:field="*{descripcion}" id="descripcion" rows="3" maxlength="400"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn-minimal-secondary" data-bs-dismiss="modal">Descartar Cambios</button>
                        <button type="submit" class="btn-minimal-primary">
                            <i class="fas fa-check"></i> <span>Confirmar Factura</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            if (typeof dateStr === 'string' && dateStr.length >= 10 && dateStr.includes('-')) {
                return dateStr.substring(0, 10);
            }
            const d = new Date(dateStr);
            d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            return [year, month, day].join('-');
        }

        let facturaModal;
        document.addEventListener("DOMContentLoaded", function () {
            const modalElement = document.getElementById('facturaModal');
            facturaModal = new bootstrap.Modal(modalElement);
        });

        function abrirModalNuevo() {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-receipt me-2" style="color: var(--accent-gold);"></i> Registrar Nueva Factura';

            document.getElementById('numeroFactura').value = '';
            document.getElementById('codigoProvedor').value = '';
            document.getElementById('idProducto').value = '';
            document.getElementById('fechaCompra').value = '';
            document.getElementById('fechaVencimiento').value = '';
            document.getElementById('pagoTotal').value = '';
            document.getElementById('claveHacienda').value = '';
            document.getElementById('idTipoDocumento').value = '';
            document.getElementById('idEstado').value = '';
            document.getElementById('descripcion').value = '';

            facturaModal.show();
        }

        function abrirModalEditar(id) {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-pen me-2" style="color: var(--accent-gold);"></i> Modificar Factura Existente';

            fetch('/facturas-proveedor/editar/' + id)
                .then(response => {
                    if (!response.ok) { throw new Error('Network response was not ok'); }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('numeroFactura').value = data.numeroFactura;
                    document.getElementById('codigoProvedor').value = data.codigoProvedor;
                    document.getElementById('idProducto').value = data.idProducto;
                    document.getElementById('fechaCompra').value = data.fechaCompra ? formatDateForInput(data.fechaCompra) : '';
                    document.getElementById('fechaVencimiento').value = data.fechaVencimiento ? formatDateForInput(data.fechaVencimiento) : '';
                    document.getElementById('pagoTotal').value = data.pagoTotal;
                    document.getElementById('claveHacienda').value = data.claveHacienda || '';
                    document.getElementById('idTipoDocumento').value = data.idTipoDocumento;
                    document.getElementById('idEstado').value = data.idEstado;
                    document.getElementById('descripcion').value = data.descripcion || '';

                    facturaModal.show();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert('No se pudieron cargar los datos de la factura.');
                });
        }
    </script>
</body>

</html>
