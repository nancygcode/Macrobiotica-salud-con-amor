<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas Proveedores - Salud con Amor</title>
    
    <!-- Bootstrap and Fonts for standalone functionality -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 0;
            min-height: 100vh;
        }

        .premium-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease-out;
        }

        .header-section h2 {
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--text-main);
            margin: 0;
            background: linear-gradient(135deg, #1f2937, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--accent-green), #34d399);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23);
            color: white;
            background: linear-gradient(135deg, var(--accent-green-hover), var(--accent-green));
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .custom-table {
            margin: 0;
            width: 100%;
        }

        .custom-table thead th {
            background-color: #f3f4f6;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 1.2rem 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .custom-table tbody td {
            padding: 1.2rem 1.5rem;
            vertical-align: middle;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .custom-table tbody tr:hover td {
            background-color: #f9fafb;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            background-color: #ecfdf5;
            color: #065f46;
        }

        .btn-action {
            background-color: white;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background-color: #eff6ff;
            color: #2563eb;
            box-shadow: var(--shadow-sm);
        }

        /* Modal Styling */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
        }

        .modal-title {
            font-weight: 700;
            color: #0f172a;
        }

        .btn-close:focus {
            box-shadow: none;
        }

        .modal-body {
            padding: 2rem;
            background-color: white;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        
        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            background-color: #f8fafc;
        }

        .btn-outline-secondary {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty State */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <main class="premium-container">
        
        <div class="header-section">
            <h2><i class="fas fa-file-invoice-dollar me-2" style="color: var(--accent-green);"></i> Facturas Proveedores</h2>
            
            <button class="btn btn-premium" onclick="abrirModalNuevo()">
                <i class="fas fa-plus"></i> Nueva Factura
            </button>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table custom-table">
                    <thead>
                        <tr>
                            <th># Factura</th>
                            <th>ID Proveedor</th>
                            <th>Fecha Compra</th>
                            <th>Vencimiento</th>
                            <th>Total Pagar</th>
                            <th>Estado ID</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f : ${facturas}">
                            <td>
                                <span class="fw-bold" style="color: #4b5563;" th:text="${f.numeroFactura}"></span>
                            </td>
                            <td>
                                <span th:text="${f.codigoProvedor}"></span>
                            </td>
                            <td>
                                <div><i class="far fa-calendar-alt text-muted me-1"></i> <span th:text="${#calendars.format(f.fechaCompra, 'dd/MM/yyyy')}"></span></div>
                            </td>
                            <td>
                                <div><i class="far fa-clock text-muted me-1"></i> <span th:text="${#calendars.format(f.fechaVencimiento, 'dd/MM/yyyy')}"></span></div>
                            </td>
                            <td>
                                <span class="fw-bold" style="color: var(--accent-green);" th:text="'₡' + ${#numbers.formatDecimal(f.pagoTotal, 1, 2)}"></span>
                            </td>
                            <td>
                                <span class="status-badge" th:text="${f.idEstado}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-action" th:onclick="'abrirModalEditar(' + ${f.numeroFactura} + ')'" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${facturas.empty}">
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="empty-icon"><i class="fas fa-box-open"></i></div>
                                    <h4>No hay facturas registradas</h4>
                                    <p>Comienza agregando una nueva factura usando el botón superior.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div class="modal fade" id="facturaModal" tabindex="-1" aria-labelledby="facturaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/facturas-proveedor/guardar}" th:object="${factura}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="facturaModalLabel"><i class="fas fa-file-invoice text-success me-2"></i> Factura de Proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <div class="modal-body">
                        <!-- Campo oculto para el ID -->
                        <input type="hidden" th:field="*{numeroFactura}" id="numeroFactura">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="codigoProvedor" class="form-label"><i class="fas fa-truck text-muted me-1"></i> Proveedor</label>
                                <select class="form-select" th:field="*{codigoProvedor}" id="codigoProvedor" required>
                                    <option value="">Seleccione un proveedor...</option>
                                    <option th:each="p : ${proveedores}" th:value="${p.codigoProvedor}" th:text="${p.nombreProvedor}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="idProducto" class="form-label"><i class="fas fa-box text-muted me-1"></i> Producto Asociado</label>
                                <select class="form-select" th:field="*{idProducto}" id="idProducto" required>
                                    <option value="">Seleccione un producto...</option>
                                    <option th:each="prod : ${productos}" th:value="${prod.codigoProducto}" th:text="${prod.nombre}"></option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="fechaCompra" class="form-label">Fecha de Compra</label>
                                <input type="date" class="form-control" th:field="*{fechaCompra}" id="fechaCompra" required>
                            </div>
                            <div class="col-md-4">
                                <label for="fechaVencimiento" class="form-label">Fecha de Vencimiento</label>
                                <input type="date" class="form-control" th:field="*{fechaVencimiento}" id="fechaVencimiento" required>
                            </div>
                            <div class="col-md-4">
                                <label for="pagoTotal" class="form-label">Monto Total (₡)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">₡</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{pagoTotal}" id="pagoTotal" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="claveHacienda" class="form-label">Clave Hacendaria</label>
                                <input type="number" class="form-control" th:field="*{claveHacienda}" id="claveHacienda" placeholder="Opcional">
                            </div>
                            <div class="col-md-4">
                                <label for="idTipoDocumento" class="form-label">Tipo Documento</label>
                                <select class="form-select" th:field="*{idTipoDocumento}" id="idTipoDocumento" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="td : ${tiposDocumento}" th:value="${td.idTipoDocumento}" th:text="${td.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="idEstado" class="form-label">Estado de la Factura</label>
                                <select class="form-select" th:field="*{idEstado}" id="idEstado" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="est : ${estados}" th:value="${est.idEstado}" th:text="${est.estado}"></option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="descripcion" class="form-label">Descripción o Notas Adicionales</label>
                                <textarea class="form-control" th:field="*{descripcion}" id="descripcion" rows="3" maxlength="400" placeholder="Detalles de la factura..."></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-premium" style="border-radius: 10px;">
                            <i class="fas fa-save"></i> Guardar Factura
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <script th:inline="javascript">
        // Helper to format Date to YYYY-MM-DD for input[type=date]
        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();

            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;

            return [year, month, day].join('-');
        }

        let facturaModal;
        document.addEventListener("DOMContentLoaded", function() {
            const modalElement = document.getElementById('facturaModal');
            facturaModal = new bootstrap.Modal(modalElement);
        });

        function abrirModalNuevo() {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-file-invoice text-success me-2"></i> Agregar Factura de Proveedor';
            
            // Limpiar formulario
            document.getElementById('numeroFactura').value = '';
            document.getElementById('codigoProvedor').value = '';
            document.getElementById('idProducto').value = '';
            document.getElementById('fechaCompra').value = '';
            document.getElementById('fechaVencimiento').value = '';
            document.getElementById('pagoTotal').value = '';
            document.getElementById('claveHacienda').value = '';
            document.getElementById('idTipoDocumento').value = '';
            document.getElementById('idEstado').value = '';
            document.getElementById('descripcion').value = '';
            
            facturaModal.show();
        }

        function abrirModalEditar(id) {
            document.getElementById('facturaModalLabel').innerHTML = '<i class="fas fa-edit text-primary me-2"></i> Editar Factura de Proveedor';
            
            // Fecth data via AJAX
            fetch('/facturas-proveedor/editar/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('numeroFactura').value = data.numeroFactura;
                    document.getElementById('codigoProvedor').value = data.codigoProvedor;
                    document.getElementById('idProducto').value = data.idProducto;
                    document.getElementById('fechaCompra').value = data.fechaCompra ? formatDateForInput(data.fechaCompra) : '';
                    document.getElementById('fechaVencimiento').value = data.fechaVencimiento ? formatDateForInput(data.fechaVencimiento) : '';
                    document.getElementById('pagoTotal').value = data.pagoTotal;
                    document.getElementById('claveHacienda').value = data.claveHacienda || '';
                    document.getElementById('idTipoDocumento').value = data.idTipoDocumento;
                    document.getElementById('idEstado').value = data.idEstado;
                    document.getElementById('descripcion').value = data.descripcion || '';
                    
                    facturaModal.show();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert('No se pudieron cargar los datos de la factura.');
                });
        }
    </script>
</body>
</html>
