<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Salud con Amor</title>
    
    <!-- Bootstrap and Fonts for standalone functionality -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-green: #8b5cf6;
            --accent-green-hover: #7c3aed;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 0;
            min-height: 100vh;
        }

        .premium-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease-out;
        }

        .header-section h2 {
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--text-main);
            margin: 0;
            background: linear-gradient(135deg, #1f2937, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--accent-green), #a78bfa);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.23);
            color: white;
            background: linear-gradient(135deg, var(--accent-green-hover), var(--accent-green));
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .custom-table {
            margin: 0;
            width: 100%;
        }

        .custom-table thead th {
            background-color: #f3f4f6;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 1.2rem 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .custom-table tbody td {
            padding: 1.2rem 1.5rem;
            vertical-align: middle;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .custom-table tbody tr:hover td {
            background-color: #f9fafb;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            background-color: #f5f3ff;
            color: #5b21b6;
        }

        .btn-action {
            background-color: white;
            color: #8b5cf6;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background-color: #f5f3ff;
            color: #6d28d9;
            box-shadow: var(--shadow-sm);
        }

        .btn-danger-action {
            background-color: white;
            color: #ef4444;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-danger-action:hover {
            background-color: #fef2f2;
            color: #dc2626;
            box-shadow: var(--shadow-sm);
        }

        /* Modal Styling */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
        }

        .modal-title {
            font-weight: 700;
            color: #0f172a;
        }

        .btn-close:focus {
            box-shadow: none;
        }

        .modal-body {
            padding: 2rem;
            background-color: white;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        
        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            background-color: #f8fafc;
        }

        .btn-outline-secondary {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty State */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <main class="premium-container">
        
        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="header-section">
            <h2><i class="fas fa-truck-loading me-2" style="color: var(--accent-green);"></i> Lista de Proveedores</h2>
            
            <button class="btn btn-premium" onclick="abrirModalNuevo()">
                <i class="fas fa-plus"></i> Nuevo Proveedor
            </button>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table custom-table">
                    <thead>
                        <tr>
                            <th>ID Proveedor</th>
                            <th>Nombre del Proveedor</th>
                            <th>Estado ID</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${provedores}">
                            <td>
                                <span class="fw-bold" style="color: #4b5563;" th:text="${p.codigoProvedor}"></span>
                            </td>
                            <td>
                                <span th:text="${p.nombreProvedor}"></span>
                            </td>
                            <td>
                                <span class="status-badge" th:text="${p.idEstado}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-action me-2" th:onclick="'abrirModalEditar(' + ${p.codigoProvedor} + ')'" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <a th:href="@{/provedores/eliminar/{id}(id=${p.codigoProvedor})}" class="btn btn-danger-action" title="Eliminar" onclick="return confirm('¿Está seguro de eliminar este proveedor?');">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${provedores.empty}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <div class="empty-icon"><i class="fas fa-truck"></i></div>
                                    <h4>No hay proveedores registrados</h4>
                                    <p>Comienza agregando un proveedor usando el botón superior.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div class="modal fade" id="provedorModal" tabindex="-1" aria-labelledby="provedorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/provedores/guardar}" th:object="${provedor}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="provedorModalLabel"><i class="fas fa-truck text-primary me-2"></i> Operación de Proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <div class="modal-body">
                        <!-- Campo para el ID -->
                        <div class="mb-3">
                            <label for="codigoProvedor" class="form-label">ID Proveedor (Dejar vacío si es automático)</label>
                            <input type="number" class="form-control bg-light" th:field="*{codigoProvedor}" id="codigoProvedor" readonly placeholder="Generado automáticamente">
                        </div>

                        <div class="mb-3">
                            <label for="nombreProvedor" class="form-label"><i class="fas fa-building text-muted me-1"></i> Nombre del Proveedor</label>
                            <input type="text" class="form-control" th:field="*{nombreProvedor}" id="nombreProvedor" required maxlength="250">
                        </div>
                        
                        <div class="mb-3">
                            <label for="idEstado" class="form-label">Estado ID</label>
                            <input type="number" class="form-control" th:field="*{idEstado}" id="idEstado" required>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-premium" style="border-radius: 10px;">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <script th:inline="javascript">
        let provedorModal;
        document.addEventListener("DOMContentLoaded", function() {
            const modalElement = document.getElementById('provedorModal');
            provedorModal = new bootstrap.Modal(modalElement);
        });

        function abrirModalNuevo() {
            document.getElementById('provedorModalLabel').innerHTML = '<i class="fas fa-truck text-primary me-2"></i> Agregar Nuevo Proveedor';
            
            // Limpiar formulario
            document.getElementById('codigoProvedor').value = '';
            document.getElementById('nombreProvedor').value = '';
            document.getElementById('idEstado').value = '';
            
            // Habilitar id en caso de ser necesario
            document.getElementById('codigoProvedor').readOnly = true;

            provedorModal.show();
        }

        function abrirModalEditar(id) {
            document.getElementById('provedorModalLabel').innerHTML = '<i class="fas fa-edit text-primary me-2"></i> Editar Proveedor';
            
            // Fetch data via AJAX
            fetch('/provedores/obtener/' + id)
                .then(response => {
                    if (!response.ok) { throw new Error('Network response was not ok'); }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('codigoProvedor').value = data.codigoProvedor;
                    document.getElementById('codigoProvedor').readOnly = true; 
                    document.getElementById('nombreProvedor').value = data.nombreProvedor;
                    document.getElementById('idEstado').value = data.idEstado;
                    
                    provedorModal.show();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert('No se pudieron cargar los datos del proveedor.');
                });
        }
    </script>
</body>
</html>
