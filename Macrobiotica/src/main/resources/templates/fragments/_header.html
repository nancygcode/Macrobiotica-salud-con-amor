<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" th:fragment="header">

    <!-- Design Tokens & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/macrobiotica.css}">

    <style>
        .minimal-nav {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f1f5f2;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none !important;
            color: #1a4d2e;
        }

        .nav-logo-link img {
            width: 40px;
            height: auto;
        }

        .nav-logo-link span {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .nav-links-hub {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links-hub a {
            text-decoration: none;
            color: #4f6f52;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .nav-links-hub a:hover, .nav-links-hub a.active {
            opacity: 1;
            color: #1a4d2e;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-user-btn {
            background: #f8faf9;
            border: 1px solid #eef2ef;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none !important;
            color: #1a4d2e;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-user-btn:hover {
            background: #ffffff;
            border-color: #1a4d2e;
        }

        @media (max-width: 768px) {
            .nav-links-hub { display: none; }
        }
    </style>

    <header class="minimal-nav">
        <div class="nav-container">
            <!-- Left: Logo & Core Hub Link -->
            <a th:href="@{/}" class="nav-logo-link">
                <img th:src="@{/images/image.png}" alt="Macrobiótica Logo">
                <span>Macrobiótica</span>
            </a>

            <!-- Center: Core Management Links -->
            <ul class="nav-links-hub">
                <li><a th:href="@{/}">Inicio</a></li>
                <li><a th:href="@{/producto/inventario}">Inventario</a></li>
                <li><a th:href="@{/reportes/ventas-facturacion}">Reportes</a></li>
                <li><a th:href="@{/provedores}">Proveedores</a></li>
            </ul>

            <!-- Right: Account Actions -->
            <div class="nav-actions">
                <!-- Simple Cart Link -->
                <a th:href="@{/producto/listado}" title="Catálogo" class="nav-user-btn">
                    <i class="fas fa-shopping-basket"></i>
                    <span>Catálogo</span>
                </a>

                <!-- User Profile (Simplified as Security is not active) -->
                <div class="dropdown">
                    <a href="#" class="nav-user-btn dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="fas fa-circle-user fa-lg"></i>
                        <span>Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3" style="border-radius: 16px; padding: 1rem;">
                        <li><a class="dropdown-item fw-600 py-2" th:href="@{/}">Panel Principal</a></li>
                        <li><hr class="dropdown-divider opacity-10"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger fw-700 py-2">Cerrar Sesión</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
</div>
